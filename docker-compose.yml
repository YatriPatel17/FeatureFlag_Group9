version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: unleash-postgres
    environment:
      POSTGRES_DB: unleash
      POSTGRES_USER: unleash_user
      POSTGRES_PASSWORD: unleash_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unleash_user -d unleash"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

#Unleash server
  unleash-server:
    image: unleashorg/unleash-server:latest
    container_name: unleash-server
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: postgres://unleash_user:unleash_password@postgres:5432/unleash
      DATABASE_SSL: "false"
      INIT_ADMIN_API_TOKENS: "*:*.unleash-default-token"
      INIT_FRONTEND_API_TOKENS: "default:development.unleash-default-token"
      INIT_ADMIN_USERNAME: admin
      INIT_ADMIN_PASSWORD: unleash4all
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4242/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
      - UNLEASH_API_URL=http://unleash-server:4242/api
      - UNLEASH_API_TOKEN=*:*.unleash-default-token
      - UNLEASH_APP_NAME=product-service
      - UNLEASH_ENVIRONMENT=development
    depends_on:
      unleash-server:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - PRODUCT_SERVICE_URL=http://product-service:8081
      - UNLEASH_API_URL=http://unleash-server:4242/api
      - UNLEASH_API_TOKEN=*:*.unleash-default-token
      - UNLEASH_APP_NAME=order-service
      - UNLEASH_ENVIRONMENT=development
    depends_on:
      product-service:
        condition: service_healthy
      unleash-server:
        condition: service_healthy
    networks:
      - ecommerce-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s


networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local